<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Position Size Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0d0d12;color:#e2e8f0;min-height:100vh;padding:20px 16px;padding-top:env(safe-area-inset-top,20px);padding-bottom:env(safe-area-inset-bottom,20px)}
.container{max-width:480px;margin:0 auto}
.header{text-align:center;margin-bottom:24px}
.logo{font-size:1.5rem;font-weight:700;color:#a78bfa;margin-bottom:4px}
.subtitle{font-size:0.8rem;color:#64748b}
.market-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:20px;background:#13131a;padding:6px;border-radius:12px;border:1px solid #1e1e2e}
.market-tab{background:transparent;border:none;color:#64748b;padding:10px 4px;border-radius:8px;cursor:pointer;font-size:0.72rem;font-weight:600;transition:all 0.15s;text-align:center}
.market-tab.active{background:#3b1f6e;color:#a78bfa}
.market-tab:not(.active):active{background:#1e1e2e}
.card{background:#13131a;border:1px solid #1e1e2e;border-radius:14px;padding:18px;margin-bottom:14px}
.card-title{font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:600}
.input-group{margin-bottom:14px}
.input-group:last-child{margin-bottom:0}
.input-label{display:flex;justify-content:space-between;align-items:center;font-size:0.72rem;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.input-hint{font-size:0.65rem;color:#475569;text-transform:none;letter-spacing:0;font-weight:normal}
.input-field{width:100%;background:#0d0d12;border:1.5px solid #2d2d3d;border-radius:10px;color:#e2e8f0;padding:14px 16px;font-size:1rem;outline:none;transition:border 0.15s;-webkit-appearance:none;font-weight:500}
.input-field:focus{border-color:#a78bfa}
.input-field::placeholder{color:#475569}
.risk-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.risk-preset{background:#1e1e2e;border:1px solid #2d2d3d;color:#94a3b8;border-radius:8px;padding:8px 4px;cursor:pointer;font-size:0.75rem;font-weight:600;transition:all 0.15s}
.risk-preset.active{background:#3b1f6e;border-color:#a78bfa;color:#a78bfa}
.result-card{background:linear-gradient(135deg,#1a1428 0%,#13131a 100%);border:1.5px solid #3b1f6e;border-radius:14px;padding:22px;text-align:center;margin-bottom:14px}
.result-label{font-size:0.7rem;color:#a78bfa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-weight:600}
.result-value{font-size:2.4rem;font-weight:800;color:#fff;line-height:1;margin-bottom:6px}
.result-unit{font-size:0.85rem;color:#94a3b8;font-weight:500}
.result-secondary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid #2d2d3d}
.result-item{text-align:center}
.result-item-val{font-size:1rem;font-weight:700;color:#e2e8f0}
.result-item-val.green{color:#4ade80}
.result-item-val.red{color:#f87171}
.result-item-lbl{font-size:0.58rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.warning{background:#2d1a0a;border:1px solid #a16207;border-radius:10px;padding:10px 14px;margin-top:10px;font-size:0.72rem;color:#fbbf24;text-align:center;display:none}
.warning.show{display:block}
.info-box{background:#0d0d12;border:1px solid #1e1e2e;border-radius:10px;padding:12px;font-size:0.7rem;color:#64748b;line-height:1.5;text-align:center}
.info-box strong{color:#94a3b8}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">📐 Position Calculator</div>
    <div class="subtitle">Risk smart. Trade confident.</div>
  </div>

  <div class="market-tabs">
    <button class="market-tab active" onclick="selectMarket('usdjpy',this)">USD/JPY</button>
    <button class="market-tab" onclick="selectMarket('mes',this)">MES</button>
    <button class="market-tab" onclick="selectMarket('mnq',this)">MNQ</button>
    <button class="market-tab" onclick="selectMarket('mcl',this)">MCL</button>
    <button class="market-tab" onclick="selectMarket('mgc',this)">MGC</button>
  </div>

  <div class="card">
    <div class="card-title">Your Account</div>
    <div class="input-group">
      <div class="input-label">Account Size <span class="input-hint">USD</span></div>
      <input type="number" class="input-field" id="account" placeholder="3250" inputmode="decimal">
    </div>
    <div class="input-group">
      <div class="input-label">Risk Per Trade <span class="input-hint">%</span></div>
      <input type="number" class="input-field" id="risk" placeholder="1" step="0.1" inputmode="decimal">
      <div class="risk-presets">
        <button class="risk-preset" onclick="setRisk(0.5,this)">0.5%</button>
        <button class="risk-preset active" onclick="setRisk(1,this)">1%</button>
        <button class="risk-preset" onclick="setRisk(2,this)">2%</button>
        <button class="risk-preset" onclick="setRisk(3,this)">3%</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="trade-title">Trade Details</div>
    <div class="input-group">
      <div class="input-label" id="stop-label">Stop Loss <span class="input-hint" id="stop-hint">pips</span></div>
      <input type="number" class="input-field" id="stop" placeholder="20" step="0.1" inputmode="decimal" oninput="calc()">
    </div>
  </div>

  <div class="result-card">
    <div class="result-label" id="size-label">Position Size</div>
    <div class="result-value" id="size-value">—</div>
    <div class="result-unit" id="size-unit">Enter values above</div>
    <div class="result-secondary">
      <div class="result-item">
        <div class="result-item-val red" id="risk-dollar">—</div>
        <div class="result-item-lbl">Risk $</div>
      </div>
      <div class="result-item">
        <div class="result-item-val" id="margin-used">—</div>
        <div class="result-item-lbl">Margin Used</div>
      </div>
    </div>
  </div>

  <div class="warning" id="warning"></div>

  <div class="info-box" id="info-box">
    <strong>Tip:</strong> Start with 1% risk per trade while rebuilding consistency.
  </div>
</div>

<script>
const MARKETS={
  usdjpy:{name:'USD/JPY',type:'forex',pipValuePer10k:0.67,marginPer10k:20,stopUnit:'pips',tradeTitle:'USD/JPY Trade',unit:'units',round:1000},
  mes:{name:'MES',type:'futures',tickValue:1.25,marginPerContract:50,stopUnit:'ticks',tradeTitle:'Micro S&P 500',unit:'contract(s)',round:1},
  mnq:{name:'MNQ',type:'futures',tickValue:0.50,marginPerContract:60,stopUnit:'ticks',tradeTitle:'Micro Nasdaq 100',unit:'contract(s)',round:1},
  mcl:{name:'MCL',type:'futures',tickValue:1.00,marginPerContract:100,stopUnit:'ticks',tradeTitle:'Micro Crude Oil',unit:'contract(s)',round:1},
  mgc:{name:'MGC',type:'futures',tickValue:1.00,marginPerContract:100,stopUnit:'ticks',tradeTitle:'Micro Gold',unit:'contract(s)',round:1}
};

let currentMarket='usdjpy';

function selectMarket(key,btn){
  currentMarket=key;
  document.querySelectorAll('.market-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const m=MARKETS[key];
  document.getElementById('trade-title').textContent=m.tradeTitle;
  document.getElementById('stop-hint').textContent=m.stopUnit;
  document.getElementById('stop-label').innerHTML=`Stop Loss <span class="input-hint">${m.stopUnit}</span>`;
  calc();
}

function setRisk(val,btn){
  document.getElementById('risk').value=val;
  document.querySelectorAll('.risk-preset').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  calc();
}

document.getElementById('account').addEventListener('input',calc);
document.getElementById('risk').addEventListener('input',()=>{
  document.querySelectorAll('.risk-preset').forEach(p=>p.classList.remove('active'));
  calc();
});

function calc(){
  const account=parseFloat(document.getElementById('account').value)||0;
  const riskPct=parseFloat(document.getElementById('risk').value)||0;
  const stop=parseFloat(document.getElementById('stop').value)||0;
  const m=MARKETS[currentMarket];
  const warning=document.getElementById('warning');
  warning.classList.remove('show');

  if(!account||!riskPct||!stop){
    document.getElementById('size-value').textContent='—';
    document.getElementById('size-unit').textContent='Enter values above';
    document.getElementById('risk-dollar').textContent='—';
    document.getElementById('margin-used').textContent='—';
    return;
  }

  const riskDollar=account*(riskPct/100);
  let size=0,margin=0,unitLabel=m.unit;

  if(m.type==='forex'){
    const riskPer10k=stop*m.pipValuePer10k;
    const rawUnits=(riskDollar/riskPer10k)*10000;
    size=Math.floor(rawUnits/m.round)*m.round;
    margin=(size/10000)*m.marginPer10k;
    unitLabel=size===1?'unit of '+m.name:'units of '+m.name;
  } else {
    const riskPerContract=stop*m.tickValue;
    size=Math.floor(riskDollar/riskPerContract);
    margin=size*m.marginPerContract;
    unitLabel=size===1?'contract of '+m.name:'contracts of '+m.name;
  }

  if(size<=0){
    document.getElementById('size-value').textContent='0';
    document.getElementById('size-unit').textContent='Stop too wide for risk amount';
    document.getElementById('risk-dollar').textContent='$'+riskDollar.toFixed(2);
    document.getElementById('margin-used').textContent='—';
    warning.textContent='⚠️ Your stop loss is too wide for this risk %. Tighten stop or increase risk.';
    warning.classList.add('show');
    return;
  }

  if(margin>account){
    warning.textContent='⚠️ Margin required exceeds account size. Reduce position.';
    warning.classList.add('show');
  } else if(margin>account*0.5){
    warning.textContent='⚠️ Using over 50% of account in margin. Consider smaller size.';
    warning.classList.add('show');
  }

  document.getElementById('size-value').textContent=size.toLocaleString();
  document.getElementById('size-unit').textContent=unitLabel;
  document.getElementById('risk-dollar').textContent='$'+riskDollar.toFixed(2);
  document.getElementById('margin-used').textContent='$'+margin.toFixed(2);
}
</script>
</body>
</html>
